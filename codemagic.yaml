# Configuración de Codemagic para Museo Origen (flutter_app)
workflows:
  android-workflow:
    name: Android Release Workflow
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        # Aquí puedes añadir tus grupos de variables de entorno para firmas (keystore)
        - keystore_credentials 
      flutter: stable
      java: 17
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Instalar dependencias
        script: |
          flutter packages pub get
      - name: Ejecutar pruebas (opcional)
        script: |
          flutter test
      - name: Compilar APK de producción
        script: |
          # El nombre del proyecto es flutter_app según pubspec.yaml
          flutter build apk --release
      - name: Compilar Android App Bundle (AAB)
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - tu_correo@ejemplo.com
        not_on_failure: false
